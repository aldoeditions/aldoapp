name: Supabase Keep-Alive

# Garde le projet Supabase (plan gratuit) actif : un ping tous les 3 jours
# évite la mise en pause automatique après ~7 jours d'inactivité.
# Nécessite 2 secrets GitHub : SUPABASE_URL et SUPABASE_ANON_KEY.

on:
  schedule:
    - cron: "0 6 */3 * *" # tous les 3 jours à 06:00 UTC
  workflow_dispatch: {} # déclenchable manuellement

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase (REST)
        run: |
          code=$(curl -sS -o /dev/null -w "%{http_code}" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/params?select=id&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}")
          echo "Supabase a répondu : HTTP $code"
          # 200/206 = OK ; on échoue seulement si l'API est injoignable.
          if [ "$code" -ge 500 ] || [ "$code" -eq 000 ]; then
            echo "::error::Supabase injoignable (HTTP $code)"
            exit 1
          fi
